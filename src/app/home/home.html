<main class="page">
  <header class="hero">
    <h1 class="hero__title">Angular PWA</h1>
    <p class="hero__subtitle">Build steps performed to scaffold this project</p>
  </header>

  <ol class="steps">
    @for (step of steps; track step.number) {
      <li class="step">
        <span class="step__number" aria-hidden="true">{{ step.number }}</span>
        <div class="step__content">
          <h2 class="step__title">{{ step.title }}</h2>
          <p class="step__description">{{ step.description }}</p>
          @if (step.command) {
            <code class="step__command">{{ step.command }}</code>
          }
        </div>
      </li>
    }
  </ol>
</main>
